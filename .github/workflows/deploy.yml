name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        
    - name: Build frontend
      run: |
        mkdir -p dist
        cp -r frontend/public/* dist/
        
    - name: Copy database
      run: |
        cp backend/fotograf.db dist/ 2>/dev/null || echo "No database file found"
        
    - name: Create Python runner
      run: |
        cat > dist/server.py << 'EOF'
        #!/usr/bin/env python3
        import os
        import sys
        import subprocess
        from flask import Flask, send_from_directory, jsonify
        import sqlite3
        import uuid
        from datetime import datetime
        
        app = Flask(__name__)
        
        # Import all routes from original app
        sys.path.append(os.path.join(os.path.dirname(__file__), 'backend'))
        
        @app.route('/')
        def index():
            return send_from_directory('.', 'index.html')
            
        @app.route('/<path:filename>')
        def static_files(filename):
            return send_from_directory('.', filename)
            
        if __name__ == '__main__':
            # Initialize database if it doesn't exist
            db_path = os.path.join(os.path.dirname(__file__), 'fotograf.db')
            if not os.path.exists(db_path):
                print("Database not found - creating empty database")
                conn = sqlite3.connect(db_path)
                conn.execute('''
                    CREATE TABLE IF NOT EXISTS chapters (
                        id INTEGER PRIMARY KEY AUTOINCREMENT,
                        name TEXT NOT NULL UNIQUE,
                        description TEXT,
                        created_at TEXT DEFAULT (datetime('now'))
                    );
                    CREATE TABLE IF NOT EXISTS questions (
                        id TEXT PRIMARY KEY,
                        chapter_id INTEGER NOT NULL,
                        text TEXT NOT NULL,
                        type TEXT NOT NULL CHECK(type IN ('closed', 'open')),
                        group_id TEXT,
                        created_at TEXT DEFAULT (datetime('now')),
                        FOREIGN KEY (chapter_id) REFERENCES chapters(id)
                    );
                    CREATE TABLE IF NOT EXISTS answers (
                        id TEXT PRIMARY KEY,
                        question_id TEXT NOT NULL,
                        text TEXT NOT NULL,
                        is_correct INTEGER DEFAULT 0,
                        sort_order INTEGER DEFAULT 0,
                        FOREIGN KEY (question_id) REFERENCES questions(id)
                    );
                    CREATE TABLE IF NOT EXISTS open_answers (
                        id TEXT PRIMARY KEY,
                        question_id TEXT NOT NULL UNIQUE,
                        sample_answer TEXT NOT NULL,
                        FOREIGN KEY (question_id) REFERENCES questions(id)
                    );
                    CREATE TABLE IF NOT EXISTS user_answers (
                        id TEXT PRIMARY KEY,
                        question_id TEXT NOT NULL,
                        session_id TEXT,
                        answer_id TEXT,
                        open_text TEXT,
                        is_correct INTEGER,
                        answered_at TEXT DEFAULT (datetime('now')),
                        FOREIGN KEY (question_id) REFERENCES questions(id)
                    );
                    CREATE TABLE IF NOT EXISTS sessions (
                        id TEXT PRIMARY KEY,
                        chapter_id INTEGER,
                        started_at TEXT DEFAULT (datetime('now')),
                        finished_at TEXT,
                        score INTEGER,
                        total INTEGER
                    );
                    INSERT OR IGNORE INTO chapters (name, description) VALUES
                        ('Technologia', 'Procesy fotograficzne, techniki i metody pracy w fotografii'),
                        ('Maszynoznawstwo', 'Aparaty fotograficzne, obiektywy, osprzęt i urządzenia'),
                        ('Materiałoznawstwo', 'Materiały światłoczułe, odczynniki chemiczne i nośniki');
                ''')
                conn.commit()
                conn.close()
            
            port = int(os.environ.get('PORT', 5000))
            app.run(host='0.0.0.0', port=port, debug=False)
        EOF
        
        chmod +x dist/server.py
        
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
