<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotograf Czeladnik — Panel Admina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #181818;
      --surface: #1e1e1e;
      --border: #2a2a2a;
      --border2: #333;
      --text: #e8e4dc;
      --text2: #999;
      --text3: #555;
      --amber: #f0a500;
      --amber2: #c78500;
      --amber-glow: rgba(240, 165, 0, 0.1);
      --red: #e05252;
      --green: #52b788;
      --radius: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: rgba(10, 10, 10, 0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      color: var(--amber);
    }

    .logo small {
      color: var(--text3);
      font-size: 0.6em;
      letter-spacing: 0.1em;
    }

    .back-btn {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border2);
      color: var(--text2);
      cursor: pointer;
      padding: 0.35rem 0.9rem;
      border-radius: var(--radius);
      text-decoration: none;
      transition: all 0.15s;
    }

    .back-btn:hover {
      color: var(--text);
      border-color: var(--text3);
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.75rem;
      padding: 0 0.5rem;
    }

    .chapter-nav-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }

    .chapter-nav-btn:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .chapter-nav-btn.active {
      background: var(--amber-glow);
      color: var(--amber);
    }

    .chapter-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      color: var(--text3);
    }

    .content {
      flex: 1;
      padding: 2rem;
      max-width: 800px;
    }

    .content-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .content-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.06em;
    }

    .btn-add {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--amber);
      color: #000;
      border: none;
      cursor: pointer;
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius);
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn-add:hover {
      background: var(--amber2);
    }

    /* Question list */
    .q-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .q-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .q-item-body {
      flex: 1;
    }

    .q-item-text {
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .q-item-meta {
      display: flex;
      gap: 0.5rem;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      border-radius: 3px;
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--border2);
      color: var(--text3);
    }

    .badge.closed {
      border-color: #7c6a4a;
      color: var(--amber);
      background: rgba(240, 165, 0, 0.1);
    }

    .badge.open {
      border-color: #4a7c6f;
      color: var(--green);
      background: rgba(82, 183, 136, 0.1);
    }

    .badge.complete {
      border-color: #4a7c6f;
      color: var(--green);
      background: rgba(82, 183, 136, 0.06);
    }

    .badge.incomplete {
      border-color: #7c4a4a;
      color: var(--red);
      background: rgba(224, 82, 82, 0.06);
    }

    .q-item-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text3);
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .icon-btn:hover {
      border-color: var(--amber2);
      color: var(--amber);
    }

    .icon-btn.del:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* Form */
    .form-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      padding: 1.5rem;
      display: none;
    }

    .form-overlay.open {
      display: flex;
    }

    .form-modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .form-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .form-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      flex: 1;
    }

    .form-close {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .form-close:hover {
      color: var(--text);
    }

    .form-body {
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.4rem;
      display: block;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      transition: border-color 0.15s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--amber2);
    }

    .form-select {
      cursor: pointer;
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    /* Answer fields */
    .answers-section {
      margin-top: 1rem;
    }

    .answer-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .answer-row input[type="text"] {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      transition: border-color 0.15s;
    }

    .answer-row input[type="text"]:focus {
      outline: none;
      border-color: var(--amber2);
    }

    .answer-row input[type="radio"] {
      accent-color: var(--amber);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .radio-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text3);
      flex-shrink: 0;
    }

    .rm-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 3px;
      font-size: 0.8rem;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .rm-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .add-answer-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      background: none;
      border: 1px dashed var(--border2);
      color: var(--text3);
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      width: 100%;
      margin-top: 0.25rem;
      transition: all 0.15s;
    }

    .add-answer-btn:hover {
      border-color: var(--amber2);
      color: var(--amber);
    }

    .form-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn-save {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--amber);
      color: #000;
      border: none;
      cursor: pointer;
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn-save:hover {
      background: var(--amber2);
    }

    .btn-cancel {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      color: var(--text2);
      border: 1px solid var(--border2);
      cursor: pointer;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius);
      transition: all 0.15s;
    }

    .btn-cancel:hover {
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
    }

    .notif {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text);
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .notif.show {
      transform: translateY(0);
      opacity: 1;
    }

    .notif.success {
      border-color: var(--green);
      color: var(--green);
    }

    .notif.error {
      border-color: var(--red);
      color: var(--red);
    }

    .hint {
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 0.3rem;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="logo">📷 FOTOGRAF <small>· PANEL ADMINA</small></div>
    <a href="index.html" class="back-btn">← Powrót do nauki</a>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">Działy</div>
      <div id="chapter-nav"></div>
    </aside>

    <main class="content">
      <div class="content-header">
        <div class="content-title" id="content-title">Wybierz dział</div>
        <button class="btn-add" id="btn-add" onclick="openForm()" style="display:none">+ Dodaj pytanie</button>
      </div>
      <div class="q-list" id="q-list">
        <div class="empty-state">Wybierz dział z listy po lewej stronie</div>
      </div>
    </main>
  </div>

  <!-- FORM MODAL -->
  <div class="form-overlay" id="form-overlay">
    <div class="form-modal">
      <div class="form-header">
        <div class="form-title" id="form-title">Dodaj pytanie</div>
        <button class="form-close" onclick="closeForm()">✕</button>
      </div>
      <div class="form-body">
        <input type="hidden" id="f-id">

        <div class="form-group">
          <label class="form-label">Dział</label>
          <select class="form-select" id="f-chapter"></select>
        </div>

        <div class="form-group">
          <label class="form-label">Treść pytania</label>
          <textarea class="form-textarea" id="f-text" placeholder="Wpisz treść pytania..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Typ pytania</label>
          <select class="form-select" id="f-type" onchange="onTypeChange()">
            <option value="closed">Zamknięte (4 odpowiedzi ABC)</option>
            <option value="open">Otwarte (własna odpowiedź)</option>
          </select>
        </div>

        <!-- Closed answers -->
        <div id="closed-section" class="answers-section">
          <label class="form-label">Odpowiedzi <span style="color:var(--text3)">(zaznacz poprawną)</span></label>
          <div id="answers-container"></div>
          <button class="add-answer-btn" onclick="addAnswerRow()">+ Dodaj odpowiedź</button>
          <div class="hint">Możesz dodać 2–4 odpowiedzi. Zaznacz radio przy poprawnej odpowiedzi.</div>
        </div>

        <!-- Open answer -->
        <div id="open-section" style="display:none">
          <div class="form-group">
            <label class="form-label">Przykładowa odpowiedź</label>
            <textarea class="form-textarea" id="f-sample" placeholder="Wpisz przykładową odpowiedź modelową..."
              style="min-height:140px"></textarea>
          </div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn-cancel" onclick="closeForm()">Anuluj</button>
        <button class="btn-save" onclick="saveQuestion()">Zapisz pytanie</button>
      </div>
    </div>
  </div>

  <div class="notif" id="notif"></div>

  <script>
    let chapters = [];
    let questions = [];
    let currentChapterId = null;
    let editingId = null;
    let answerCounter = 0;

    function showNotif(msg, type = '') {
      const n = document.getElementById('notif');
      n.textContent = msg;
      n.className = 'notif show ' + type;
      setTimeout(() => { n.className = 'notif'; }, 3000);
    }

    async function loadChapters() {
      const res = await fetch('/api/chapters');
      chapters = await res.json();
      renderChapterNav();
      populateChapterSelect();
    }

    function renderChapterNav() {
      const nav = document.getElementById('chapter-nav');
      nav.innerHTML = chapters.map(c => `
    <button class="chapter-nav-btn ${c.id === currentChapterId ? 'active' : ''}"
            onclick="selectChapter(${c.id})">
      ${c.name}
      <span class="chapter-count" id="count-${c.id}">${c.question_count || 0}</span>
    </button>`).join('');
    }

    function populateChapterSelect() {
      const sel = document.getElementById('f-chapter');
      sel.innerHTML = chapters.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      if (currentChapterId) sel.value = currentChapterId;
    }

    async function selectChapter(id) {
      currentChapterId = id;
      renderChapterNav();
      const chapter = chapters.find(c => c.id === id);
      document.getElementById('content-title').textContent = chapter?.name || '';
      document.getElementById('btn-add').style.display = 'block';
      await loadQuestions();
    }

    async function loadQuestions() {
      const res = await fetch('/api/questions?chapter_id=' + currentChapterId);
      questions = await res.json();
      renderQuestions();
    }

    function renderQuestions() {
      const list = document.getElementById('q-list');
      if (questions.length === 0) {
        list.innerHTML = '<div class="empty-state">Brak pytań w tym dziale.<br>Kliknij "Dodaj pytanie" aby dodać pierwsze.</div>';
        return;
      }
      list.innerHTML = questions.map((q, i) => {
        const isComplete = q.type === 'closed'
          ? (q.answers && q.answers.length >= 2 && q.answers.some(a => a.is_correct))
          : !!q.sample_answer;
        return `
      <div class="q-item">
        <div class="q-item-body">
          <div class="q-item-text">${i + 1}. ${q.text}</div>
          <div class="q-item-meta">
            <span class="badge ${q.type}">${q.type === 'closed' ? 'Zamknięte' : 'Otwarte'}</span>
            <span class="badge ${isComplete ? 'complete' : 'incomplete'}">${isComplete ? '✓ Kompletne' : '✗ Brak odpowiedzi'}</span>
            ${q.type === 'closed' ? `<span class="badge">${(q.answers || []).length} odp.</span>` : ''}
          </div>
        </div>
        <div class="q-item-actions">
          <button class="icon-btn" onclick="openForm('${q.id}')" title="Edytuj">✎</button>
          <button class="icon-btn del" onclick="deleteQuestion('${q.id}')" title="Usuń">✕</button>
        </div>
      </div>`;
      }).join('');
    }

    function onTypeChange() {
      const type = document.getElementById('f-type').value;
      document.getElementById('closed-section').style.display = type === 'closed' ? 'block' : 'none';
      document.getElementById('open-section').style.display = type === 'open' ? 'block' : 'none';
    }

    function addAnswerRow(text = '', isCorrect = false) {
      const id = 'ans-' + (++answerCounter);
      const row = document.createElement('div');
      row.className = 'answer-row';
      row.id = id;
      row.innerHTML = `
    <input type="radio" name="correct-answer" value="${id}" ${isCorrect ? 'checked' : ''} title="Zaznacz jako poprawną">
    <input type="text" placeholder="Treść odpowiedzi..." value="${text}">
    <button class="rm-btn" onclick="document.getElementById('${id}').remove()" title="Usuń">✕</button>`;
      document.getElementById('answers-container').appendChild(row);
    }

    function openForm(qId = null) {
      editingId = qId;
      document.getElementById('form-title').textContent = qId ? 'Edytuj pytanie' : 'Dodaj pytanie';
      document.getElementById('answers-container').innerHTML = '';
      answerCounter = 0;

      if (qId) {
        const q = questions.find(x => x.id === qId);
        if (!q) return;
        document.getElementById('f-id').value = q.id;
        document.getElementById('f-chapter').value = q.chapter_id;
        document.getElementById('f-text').value = q.text;
        document.getElementById('f-type').value = q.type;
        onTypeChange();

        if (q.type === 'closed') {
          (q.answers || []).forEach(a => addAnswerRow(a.text, !!a.is_correct));
        } else {
          document.getElementById('f-sample').value = q.sample_answer || '';
        }
      } else {
        document.getElementById('f-id').value = '';
        document.getElementById('f-chapter').value = currentChapterId || chapters[0]?.id;
        document.getElementById('f-text').value = '';
        document.getElementById('f-type').value = 'closed';
        document.getElementById('f-sample').value = '';
        onTypeChange();
        // Add 4 empty answer rows
        addAnswerRow(); addAnswerRow(); addAnswerRow(); addAnswerRow();
      }

      document.getElementById('form-overlay').classList.add('open');
    }

    function closeForm() {
      document.getElementById('form-overlay').classList.remove('open');
      editingId = null;
    }

    async function saveQuestion() {
      const text = document.getElementById('f-text').value.trim();
      const type = document.getElementById('f-type').value;
      const chapterId = document.getElementById('f-chapter').value;

      if (!text) { showNotif('Wpisz treść pytania', 'error'); return; }

      let payload = { text, type, chapter_id: chapterId };

      if (type === 'closed') {
        const rows = document.querySelectorAll('#answers-container .answer-row');
        const checked = document.querySelector('#answers-container input[type="radio"]:checked');
        const answers = [];
        rows.forEach(row => {
          const inp = row.querySelector('input[type="text"]');
          const radio = row.querySelector('input[type="radio"]');
          if (inp.value.trim()) {
            answers.push({ text: inp.value.trim(), is_correct: radio === checked });
          }
        });
        if (answers.length < 2) { showNotif('Dodaj co najmniej 2 odpowiedzi', 'error'); return; }
        if (!checked) { showNotif('Zaznacz poprawną odpowiedź', 'error'); return; }
        payload.answers = answers;
      } else {
        payload.sample_answer = document.getElementById('f-sample').value.trim();
      }

      try {
        const method = editingId ? 'PUT' : 'POST';
        const url = editingId ? '/api/questions/' + editingId : '/api/questions';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('Server error');
        showNotif(editingId ? 'Pytanie zaktualizowane' : 'Pytanie dodane', 'success');
        closeForm();
        await loadQuestions();
        await loadChapters();
      } catch (e) {
        showNotif('Błąd zapisu: ' + e.message, 'error');
      }
    }

    async function deleteQuestion(qId) {
      if (!confirm('Usunąć to pytanie? Operacja jest nieodwracalna.')) return;
      try {
        await fetch('/api/questions/' + qId, { method: 'DELETE' });
        showNotif('Pytanie usunięte', 'success');
        await loadQuestions();
        await loadChapters();
      } catch (e) {
        showNotif('Błąd usuwania', 'error');
      }
    }

    document.getElementById('form-overlay').onclick = function (e) {
      if (e.target === this) closeForm();
    };

    loadChapters();
  </script>
</body>

</html>
